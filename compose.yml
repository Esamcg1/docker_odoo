services:
  db:
    image: postgres:12.0
    container_name: odoo16-db 
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - db-data16:/var/lib/postgresql/data

  odoo18:
    image: odoo:16
    container_name: odoo16 
    depends_on:
      - db
    ports:
      - "8072:8069" 
    environment:
      - OE_SUPERADMIN_PASSWD=TU_CLAVE_SUPERSECRETA 
      - POSTGRES_HOST=db
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - odoo-web-data16:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./config:/etc/odoo

volumes:
  db-data16:
  odoo-web-data16:




